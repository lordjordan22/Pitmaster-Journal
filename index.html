<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitMaster Journal</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Basic CSS Reset -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Source Sans 3', sans-serif;
    }
    body {
      background-color: #fafafa;
      color: #333;
      line-height: 1.6;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
    }
    section {
      margin-bottom: 30px;
      padding: 20px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #0070f3;
      color: white;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>

  <header>
    <h1>PitMaster Journal</h1>
    <p>Track your BBQ experiments, lessons, and recipes.</p>
  </header>

  <main>
    <section id="add-entry">
      <h2>Add New Entry</h2>
      <input type="text" id="entry-title" placeholder="Title" style="width: 100%; padding: 8px; margin-bottom: 10px;">
      <textarea id="entry-content" placeholder="Your notes..." style="width: 100%; padding: 8px; height: 100px;"></textarea>
      <button id="save-entry">Save Entry</button>
    </section>

    <section id="entries-list">
      <h2>Your Entries</h2>
      <ul id="entries" style="list-style: none; padding-left: 0;"></ul>
    </section>
  </main>

  <!-- Supabase Setup -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script>
    // 🔥 Supabase setup
    const SUPABASE_URL = "https://fdufltxylxoemuqvoeej.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sy69DPFEsPgkXKZwOXMFUw_XGUF59d1";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const saveButton = document.getElementById('save-entry');
    const entriesList = document.getElementById('entries');

    saveButton.addEventListener('click', async () => {
      const title = document.getElementById('entry-title').value;
      const content = document.getElementById('entry-content').value;

      if (!title || !content) {
        alert('Please enter both title and content.');
        return;
      }

      // Insert entry into Supabase
      const { data, error } = await supabase
        .from('entries')
        .insert([{ title, content }]);

      if (error) {
        console.error('Error saving entry:', error);
      } else {
        alert('Entry saved!');
        loadEntries();
      }
    });

    async function loadEntries() {
      const { data, error } = await supabase
        .from('entries')
        .select('*')
        .order('id', { ascending: false });

      if (error) {
        console.error('Error loading entries:', error);
        return;
      }

      entriesList.innerHTML = '';
      data.forEach(entry => {
        const li = document.createElement('li');
        li.style.padding = '10px 0';
        li.style.borderBottom = '1px solid #eee';
        li.innerHTML = `<strong>${entry.title}</strong><p>${entry.content}</p>`;
        entriesList.appendChild(li);
      });
    }

    // Load entries on page load
    loadEntries();
  </script>

</body>
</html>
